name: Keep Streamlit App Alive

on:
  schedule:
    - cron: "0 */8 * * *"   # každých 8 hodin (3× denně)
  workflow_dispatch:          # manuální spuštění z GitHub UI

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r keep_alive/requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Wake up Streamlit app
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: python keep_alive/wake_app.py
